---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - argon.argon.github.io
  resources:
  - argonconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - argon.argon.github.io
  resources:
  - argonconfigs/finalizers
  verbs:
  - update
- apiGroups:
  - argon.argon.github.io
  resources:
  - argonconfigs/status
  verbs:
  - get
  - patch
  - update
